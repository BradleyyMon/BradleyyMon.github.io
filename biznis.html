<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Privé</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    color:#d4af37;
    font-size:40px;
}

header p{
    color:#aaa;
    margin-top:10px;
}


/* Portfolio */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}


.project{
    background:#151515;
    border:1px solid #333;
    padding:30px 20px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}


.project:hover{
    transform:translateY(-8px);
    border-color:#d4af37;
    box-shadow:0 0 20px #d4af37;
}


.project h2{
    color:#d4af37;
    font-size:22px;
}


.project span{
    display:block;
    margin-top:15px;
    color:#aaa;
}



footer{
    text-align:center;
    padding:40px;
    color:#777;
}

</style>

</head>


<body>


<header>

<h1>My Private Portfolio</h1>
<p>Klike sou yon pwojè pou ouvri li</p>

<div class="container" id="portfolio"></div>
